<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>座位检测 实时检测 Viewer</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
  h2 { margin-bottom: 10px; }
  #container { position: relative; display: inline-block; margin-top: 10px; border: 2px solid #444; background: #000; }
  #stream { display: block; max-width: 90vw; max-height: 70vh; }
  #info { margin-top: 15px; font-size: 16px; }
  .status { display: inline-block; margin: 5px; padding: 6px 14px; border-radius: 4px; background: #333; }
  #config { margin-bottom: 10px; }
  input { padding: 6px 10px; font-size: 14px; border: 1px solid #555; background: #222; color: #fff; border-radius: 3px; }
  button { padding: 6px 16px; font-size: 14px; cursor: pointer; border: none; background: #0a84ff; color: #fff; border-radius: 3px; }
  button:hover { background: #0060df; }
  #connStatus { color: #aaa; margin-left: 10px; font-size: 14px; }
  .legend { margin-top: 8px; font-size: 13px; color: #aaa; }
  .legend span { margin: 0 10px; }
  .box-table { color: #0f0; }
  .box-seated { color: #4af; }
  .box-standing { color: #f44; }
</style>
</head>
<body>
<h2>ESP32-CAM 实时检测 Viewer</h2>
<div id="config">
  <label>ESP32 IP: <input type="text" id="espIp" placeholder="例如: 192.168.51.100" style="width:180px;"></label>
  <button onclick="connect()">连接</button>
  <span id="connStatus">等待连接...</span>
</div>
<div id="container">
  <img id="stream" src="" alt="带框视频流">
</div>
<div class="legend">
  <span class="box-table">■ 椅子 (Chair)</span>
  <span class="box-seated">■ 就座 (Seated)</span>
  <span class="box-standing">■ 站立 (Standing)</span>
</div>
<div id="info">
  <div class="status">总人数: <b id="total">-</b></div>
  <div class="status">人脸: <b id="face" style="color:#ff0;">-</b></div>
  <div class="status">就座: <b id="seated" style="color:#4af;">-</b></div>
  <div class="status">站立: <b id="standing" style="color:#f44;">-</b></div>
  <div class="status">椅子: <b id="tables">-</b></div>
  <div class="status">密度: <b id="density">-</b></div>
</div>

<script>
const API_BASE = '';
let pollTimer = null;

async function fetchEspIp() {
  try {
    const r = await fetch(API_BASE + '/esp32-ip');
    const d = await r.json();
    if (d.esp32_ip) {
      document.getElementById('espIp').value = d.esp32_ip;
      startStream();
    }
  } catch(e) { console.log('尚未记录 ESP32 IP'); }
}

function startStream() {
  const img = document.getElementById('stream');
  img.src = API_BASE + '/annotated-stream?t=' + Date.now();
  document.getElementById('connStatus').textContent = '加载中...';

  // 8 秒后如果还在加载中，自动刷新重试
  setTimeout(() => {
    if (document.getElementById('connStatus').textContent === '加载中...') {
      document.getElementById('connStatus').textContent = '重试中...';
      img.src = API_BASE + '/annotated-stream?t=' + Date.now();
    }
  }, 8000);

  img.onload = () => {
    document.getElementById('connStatus').textContent = '播放中';
  };
  img.onerror = () => {
    document.getElementById('connStatus').textContent = '流加载失败';
  };
  if (!pollTimer) pollTimer = setInterval(pollResult, 500);
}

async function connect() {
  const ip = document.getElementById('espIp').value.trim();
  if (!ip) return alert('请输入 ESP32 IP');
  try {
    const r = await fetch(API_BASE + '/set-esp32-ip', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ip: ip})
    });
    const d = await r.json();
    if (d.status === 'ok') {
      startStream();
    } else {
      alert('设置失败: ' + (d.error || '未知错误'));
    }
  } catch(e) { alert('请求失败: ' + e); }
}

async function pollResult() {
  try {
    const r = await fetch(API_BASE + '/result');
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('total').textContent = d.total_persons ?? '-';
    document.getElementById('face').textContent = d.face_count ?? '-';
    document.getElementById('seated').textContent = d.seated ?? '-';
    document.getElementById('standing').textContent = d.standing ?? '-';
    document.getElementById('tables').textContent = d.table_count ?? '-';
    document.getElementById('density').textContent = d.density ? d.density.density_level : '-';
  } catch(e) {}
}

fetchEspIp();
</script>
</body>
</html>
